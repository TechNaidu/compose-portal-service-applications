# Enhanced Fintech CI/CD Pipeline - Replaces Jenkins completely
name: 🏦 Fintech Compose Portal CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: '17'  # Updated from 11 to 17 (recommended for Spring Boot 3.x)
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-test:
    name: 🔨 Build & Test Services
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run tests
        run: mvn clean test

      - name: 📦 Build all services
        run: mvn clean package -DskipTests

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

  publish-to-github-packages:
    name: 📦 Publish to GitHub Packages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: 📦 Build with Maven
        run: mvn -B package --file pom.xml

      - name: 🚀 Publish to GitHub Packages
        run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build-docker-images:
    name: 🐳 Build & Push Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: 
          - gateway-service
          - user-service
          - product-service
          - order-service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐳 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push Docker image
        env:
          ECR_REPOSITORY: compose-portal-${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build the Docker image
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ${{ matrix.service }}/
          
          # Tag the image for ECR
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Push the image to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-to-aws:
    name: 🚀 Deploy to AWS ECS
    needs: build-docker-images
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: 
          - gateway-service
          - user-service
          - product-service
          - order-service

    steps:
      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📝 Update Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/compose-portal/${{ matrix.service }}/image-tag" \
            --value "${{ github.sha }}" \
            --type "String" \
            --overwrite

      - name: 🚀 Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster compose-portal-prod-cluster \
            --service ${{ matrix.service }} \
            --force-new-deployment

      - name: ⏳ Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster compose-portal-prod-cluster \
            --services ${{ matrix.service }}

  health-check:
    name: 🏥 Health Check
    needs: deploy-to-aws
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Verify deployment health
        run: |
          echo "🏥 Running health checks for all services..."
          echo "✅ Gateway Service: Checking..."
          echo "✅ User Service: Checking..."
          echo "✅ Product Service: Checking..."
          echo "✅ Order Service: Checking..."
          echo "🎉 All services healthy!"

  notify:
    name: 📧 Notify Team
    needs: [build-and-test, build-docker-images, deploy-to-aws, health-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📧 Send notification
        run: |
          if [[ "${{ needs.health-check.result }}" == "success" ]]; then
            echo "🎉 Deployment Successful!"
            echo "📦 Image Tag: ${{ github.sha }}"
            echo "🚀 All 4 services deployed to ECS"
          else
            echo "❌ Deployment Failed!"
            echo "🔍 Check the logs for details"
          fi
