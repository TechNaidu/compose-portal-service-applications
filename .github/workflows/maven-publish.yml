# Enhanced Fintech CI/CD Pipeline - Replaces Jenkins completely
name: 🏦 Fintech Compose Portal CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: '17'  # Updated from 11 to 17 (recommended for Spring Boot 3.x)
  # Use account ID + region to compute correct ECR registry domain
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
  COMPOSE_ALB_HOST: ${{ secrets.COMPOSE_ALB_HOST }}

jobs:
  build-and-test:
    name: 🔨 Build & Test Services
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run tests
        run: mvn -B test

      - name: 📦 Build all services
        run: mvn -B package -DskipTests

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

  publish-to-github-packages:
    name: 📦 Publish to GitHub Packages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: 📦 Build with Maven
        run: mvn -B package --file pom.xml

      - name: 🚀 Publish to GitHub Packages
        run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build-docker-images:
    name: 🐳 Build & Push Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: 
          - gateway-service
          - user-service
          - product-service
          - order-service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Prefer OIDC role assumption (recommended). Fallback to long-lived AWS keys if provided.
      - name: 🔐 Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Configure AWS credentials (access keys fallback)
        if: ${{ secrets.AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐳 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICE_FOLDER="${{ matrix.service }}"
          # strip trailing '-service' to form repo name like compose-portal-gateway
          REPO_BASE=${SERVICE_FOLDER%-service}
          ECR_REPOSITORY="compose-portal-${REPO_BASE}"

          echo "Building ${SERVICE_FOLDER} -> repo ${ECR_REPOSITORY}"

          # Build the Docker image from the service folder
          docker build -t ${ECR_REPOSITORY}:${IMAGE_TAG} ${SERVICE_FOLDER}/

          # Tag the image for ECR
          docker tag ${ECR_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker tag ${ECR_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

          # Push the image to ECR
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

  deploy-to-aws:
    name: 🚀 Deploy to AWS ECS
    needs: build-docker-images
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: 
          - gateway-service
          - user-service
          - product-service
          - order-service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Configure AWS credentials (access keys fallback)
        if: ${{ secrets.AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🧰 Install jq (used to modify task definition)
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: 🔎 Ensure ECR image exists
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICE_FOLDER="${{ matrix.service }}"
          REPO_BASE=${SERVICE_FOLDER%-service}
          ECR_REPOSITORY="compose-portal-${REPO_BASE}"

          echo "Verifying image ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG} exists in ECR..."
          aws ecr describe-images --repository-name ${ECR_REPOSITORY} --image-ids imageTag=${IMAGE_TAG} >/dev/null

      - name: 📝 Update Parameter Store (image tag per service)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ssm put-parameter \
            --name "/compose-portal/${{ matrix.service }}/image-tag" \
            --value "${IMAGE_TAG}" \
            --type "String" \
            --overwrite

      - name: 🔁 Register new ECS task definition with updated image and update service
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICE_NAME="${{ matrix.service }}"
          REPO_BASE=${SERVICE_NAME%-service}
          ECR_REPOSITORY="compose-portal-${REPO_BASE}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Deploying ${SERVICE_NAME} -> ${IMAGE_URI}"

          # Get current task definition ARN from the ECS service
          TASK_DEF_ARN=$(aws ecs describe-services --cluster compose-portal-prod-cluster --services ${SERVICE_NAME} --query 'services[0].taskDefinition' --output text)
          echo "Current task definition ARN: ${TASK_DEF_ARN}"

          # Fetch the task definition JSON
          TASK_DEF_JSON=$(aws ecs describe-task-definition --task-definition ${TASK_DEF_ARN} --query 'taskDefinition' --output json)

          # Replace container image(s) with our new image and remove fields not accepted by register-task-definition
          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq --arg IMG "${IMAGE_URI}" '(.containerDefinitions[] | .image) |= $IMG | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register the new task definition
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered new task definition: ${NEW_ARN}"

          # Update the ECS service to use the new task definition
          aws ecs update-service --cluster compose-portal-prod-cluster --service ${SERVICE_NAME} --task-definition ${NEW_ARN} --force-new-deployment

      - name: ⏳ Wait for deployment to complete
        run: |
          aws ecs wait services-stable --cluster compose-portal-prod-cluster --services ${{ matrix.service }}

  health-check:
    name: 🏥 Health Check
    needs: deploy-to-aws
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Verify deployment health via Actuator endpoints (ALB)
        env:
          ALB_HOST: ${{ env.COMPOSE_ALB_HOST }}
        run: |
          set -euo pipefail
          # Default ALB host fallback if secret not provided
          ALB=${ALB_HOST:-compose-portal-alb.us-east-1.elb.amazonaws.com}
          echo "Using ALB: ${ALB}"

          SERVICES=("gateway-service:8080" "user-service:8081" "product-service:8082" "order-service:8083")
          FAILURES=0

          for svc in "${SERVICES[@]}"; do
            NAME=${svc%%:*}
            PORT=${svc##*:}
            URL="http://${ALB}:${PORT}/actuator/health"
            echo "Checking ${NAME} -> ${URL}"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}") || true
            if [ "${HTTP_STATUS}" != "200" ]; then
              echo "❌ ${NAME} unhealthy (HTTP ${HTTP_STATUS})"
              FAILURES=$((FAILURES+1))
            else
              echo "✅ ${NAME} healthy"
            fi
          done

          if [ ${FAILURES} -ne 0 ]; then
            echo "❌ ${FAILURES} service(s) failed health checks"
            exit 1
          fi

          echo "✅ All services healthy"

  notify:
    name: 📧 Notify Team
    needs: [build-and-test, build-docker-images, deploy-to-aws, health-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📧 Send notification
        run: |
          if [[ "${{ needs.health-check.result }}" == "success" ]]; then
            echo "🎉 Deployment Successful!"
            echo "📦 Image Tag: ${{ github.sha }}"
            echo "🚀 All 4 services deployed to ECS"
          else
            echo "❌ Deployment Failed!"
            echo "🔍 Check the logs for details"
          fi
