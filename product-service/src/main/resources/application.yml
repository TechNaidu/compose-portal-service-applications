server:
  port: 8082

spring:
  application:
    name: product-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Product Service
    description: Product Catalog Microservice
    version: 1.0.0

